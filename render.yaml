services:
  - type: web
    name: cryptoquant-backend
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      pip install -r backend/requirements.txt 2>/dev/null || true
    startCommand: cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: LIVE_TRADING
        value: "false"
      - key: BINANCE_API_KEY
        value: ""
      - key: BINANCE_SECRET_KEY
        value: ""
    autoDeploy: true
